const FMT={feed:{w:1080,h:1440},historia:{w:1080,h:1920}};
const base={etiqueta:"CASA EN VENTA",ubic:"Av.4 782, Costa del Este",precio:"USD 129.000",datos:"3 amb · 2 baños · 460 m²",foto:PHOTO,logo:PILL};
const tiles=[
 ["Classic · Feed 3:4","v","feed",_mimgSVG_A,{}],
 ["Estado · Feed 3:4","v","feed",_mimgSVG_C,{estado:"Vendida"}],
 ["Classic · Historia","h","historia",_mimgSVG_A,{}],
 ["Estado · Historia","h","historia",_mimgSVG_C,{estado:"Reservada"}],
];
async function go(){
  await document.fonts.ready;
  const root=document.getElementById("root");
  tiles.forEach(([lab,size,fmt,fn,extra])=>{
    const f=FMT[fmt];
    const svg=fn(f.w,f.h,Object.assign({},base,extra));
    const col=document.createElement("div");col.className="col "+size;
    col.innerHTML='<span class="cap">'+lab+'</span><div class="card">'+svg+'</div><button>Descargar PNG</button>';
    col.querySelector("button").onclick=async()=>{
      const url=URL.createObjectURL(new Blob([svg],{type:"image/svg+xml;charset=utf-8"}));
      const img=new Image();await new Promise((r,j)=>{img.onload=r;img.onerror=j;img.src=url;});
      const c=document.createElement("canvas");c.width=f.w;c.height=f.h;
      c.getContext("2d").drawImage(img,0,0,f.w,f.h);URL.revokeObjectURL(url);
      const a=document.createElement("a");a.download=lab.replace(/[^a-z0-9]+/gi,"_")+".png";a.href=c.toDataURL("image/png");a.click();
    };
    root.appendChild(col);
  });
}
go();
