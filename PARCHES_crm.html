<button id="btnFollowUps"
        onclick="toggleFollowUps()"
        style="background: #f59e0b; color: white; border: none; padding: 10px 16px;
               border-radius: 8px; font-weight: 600; cursor: pointer; margin-left: 8px;">

<!-- ════════════════════════════════════════════════════════════════════════════
     PARCHE 3 — Funciones JavaScript nuevas
     ----------------------------------------------------------------------------
     UBICACIÓN: dentro del <script> del CRM, al lado de refrescarEstadoBot(),
                reiniciarBotRemoto(), limpiarSesionBot().
     ACCIÓN: PEGAR tal cual
     ════════════════════════════════════════════════════════════════════════════ -->

<script>
// Estado local: se sincroniza con el bot vía bot_status.notas
let _followUpsPausadosLocal = false;

async function toggleFollowUps() {
  const pausarAhora = !_followUpsPausadosLocal;
  const comando = pausarAhora ? 'pausar_followups' : 'reanudar_followups';
  const textoConfirm = pausarAhora
    ? '¿Pausar TODOS los follow-ups automáticos de Vera?\n\nVera va a seguir respondiendo mensajes, pero NO va a enviar seguimientos a leads hasta que los reanudes.'
    : '¿Reanudar los follow-ups automáticos de Vera?';

  if (!confirm(textoConfirm)) return;

  const btn = document.getElementById('btnFollowUps');
  const textoOriginal = btn ? btn.innerText : '';
  if (btn) { btn.disabled = true; btn.innerText = '⏳ Enviando orden...'; }

  try {
    const { error } = await supabase
      .from('bot_comandos')
      .insert({
        comando: comando,
        estado: 'pendiente',
        creado_por: (typeof _usuarioActual !== 'undefined' && _usuarioActual && _usuarioActual.email) || 'crm',
        creado: new Date().toISOString()
      });

    if (error) throw error;

    alert('✓ Orden enviada.\n\nEn unos segundos va a llegar confirmación por WhatsApp y el cartel del CRM se actualiza.');
    // El bot chequea cada 10s, damos 12s de margen
    setTimeout(refrescarEstadoBot, 12000);
  } catch (e) {
    alert('✗ Error: ' + e.message);
    if (btn) { btn.disabled = false; btn.innerText = textoOriginal; }
  }
}

// Actualiza UI según estado actual (la llama refrescarEstadoBot)
function actualizarUIFollowUps(pausado) {
  _followUpsPausadosLocal = pausado;
  const btn = document.getElementById('btnFollowUps');
  const cartel = document.getElementById('cartelFollowUpsPausados');

  if (btn) {
    btn.disabled = false;
    if (pausado) {
      btn.innerText = '▶ Reanudar follow-ups';
      btn.style.background = '#10b981';
    } else {
      btn.innerText = '⏸ Pausar follow-ups';
      btn.style.background = '#f59e0b';
    }
  }
  if (cartel) cartel.style.display = pausado ? 'block' : 'none';
}
</script>
