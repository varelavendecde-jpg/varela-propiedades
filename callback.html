<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Callback OAuth · Varela</title>
<style>
body{font-family:system-ui,sans-serif;max-width:640px;margin:60px auto;padding:0 24px;color:#2E2F3E;}
h1{font-size:22px;margin-bottom:24px;}
.box{background:#FAF9F5;border:1px solid rgba(107,111,138,0.15);border-radius:10px;padding:18px;margin-bottom:14px;}
label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#A0A3B5;font-weight:600;margin-bottom:6px;}
input,textarea{width:100%;padding:10px;border:1px solid rgba(107,111,138,0.2);border-radius:6px;font-family:'SF Mono',monospace;font-size:13px;background:#fff;}
textarea{min-height:60px;resize:vertical;}
.code{font-family:'SF Mono',monospace;font-size:12px;background:#FDFBE8;padding:8px 12px;border-radius:6px;word-break:break-all;border:1px solid #FBF5A0;}
button{background:#F5E642;color:#2A2B38;border:none;padding:14px 24px;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px;margin-top:8px;}
button:hover{background:#FBF5A0;}
button:disabled{opacity:0.5;cursor:not-allowed;}
.ok{background:#DCFCE7;border-color:#86EFAC;color:#15803D;}
.err{background:#FEF2F2;border-color:#FECACA;color:#991B1B;}
.step{font-size:12px;color:#6B6F8A;margin-bottom:6px;}
pre{background:#2A2B38;color:#F5E642;padding:14px;border-radius:8px;font-size:12px;overflow-x:auto;}
</style>
</head>
<body>

<h1>🔐 Callback OAuth — Varela ML Tasador</h1>

<div id="step1">
  <div class="step">Esta página la usás <b>UNA SOLA VEZ</b> para obtener el primer refresh_token de la app de ML.</div>
</div>

<div id="state-loading" style="display:none;">
  <div class="box">⏳ Procesando código de autorización...</div>
</div>

<div id="state-result" style="display:none;"></div>

<div id="state-manual">
  <div class="box">
    <div class="step">¿No te llegó automáticamente? Pegá manualmente los datos:</div>
    <label>App ID</label>
    <input id="manual-appid" placeholder="6789012345678901">
    <br><br>
    <label>App Secret</label>
    <input id="manual-secret" placeholder="aBcDeF...">
    <br><br>
    <label>Authorization Code (de la URL de redirect, parámetro <code>?code=</code>)</label>
    <input id="manual-code" placeholder="TG-...">
    <br><br>
    <button onclick="intercambiarManual()">Intercambiar por refresh_token</button>
  </div>
</div>

<script>
// ────────────────────────────────────────────────────────────
// Si la URL trae ?code=... entonces venimos del redirect de ML.
// Pedimos al usuario que pegue App ID + Secret y hacemos el intercambio.
// ────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const codeFromUrl = params.get('code');

if (codeFromUrl) {
  document.getElementById('manual-code').value = codeFromUrl;
  document.getElementById('step1').innerHTML = `
    <div class="box ok">✅ Code recibido de Mercado Libre. Pegá App ID y Secret abajo y dale a "Intercambiar".</div>
  `;
}

async function intercambiarManual() {
  const appId = document.getElementById('manual-appid').value.trim();
  const secret = document.getElementById('manual-secret').value.trim();
  const code = document.getElementById('manual-code').value.trim();

  if (!appId || !secret || !code) {
    alert('Faltan datos');
    return;
  }

  document.getElementById('state-manual').style.display = 'none';
  document.getElementById('state-loading').style.display = 'block';

  const params = new URLSearchParams({
    grant_type: 'authorization_code',
    client_id: appId,
    client_secret: secret,
    code: code,
    redirect_uri: window.location.origin + window.location.pathname
  });

  try {
    const resp = await fetch('https://api.mercadolibre.com/oauth/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString()
    });
    const data = await resp.json();
    document.getElementById('state-loading').style.display = 'none';

    if (!resp.ok || !data.access_token) {
      document.getElementById('state-result').innerHTML = `
        <div class="box err">❌ Error: ${JSON.stringify(data)}</div>
      `;
      document.getElementById('state-result').style.display = 'block';
      document.getElementById('state-manual').style.display = 'block';
      return;
    }

    // Calcular expires_at en ISO 8601
    const expiresAt = new Date(Date.now() + (data.expires_in - 60) * 1000).toISOString();

    document.getElementById('state-result').innerHTML = `
      <div class="box ok">✅ ¡Tokens obtenidos! Guardalos en Supabase con este SQL:</div>
      <pre>insert into ml_tokens (id, access_token, refresh_token, expires_at)
values (
  'tasador',
  '${data.access_token}',
  '${data.refresh_token}',
  '${expiresAt}'
)
on conflict (id) do update set
  access_token = excluded.access_token,
  refresh_token = excluded.refresh_token,
  expires_at = excluded.expires_at,
  updated_at = now();</pre>
      <div class="box">
        <div class="step">📋 Pasos siguientes:</div>
        <ol style="font-size:13px;line-height:1.7;padding-left:20px;">
          <li>Copiá el SQL de arriba.</li>
          <li>En Supabase, andá a <b>SQL Editor</b> y pegalo. Run.</li>
          <li>En Project Settings → Edge Functions → Secrets, agregá: <br><code>ML_APP_ID = ${appId}</code><br><code>ML_APP_SECRET = ${secret}</code></li>
          <li>Deployá la Edge Function <code>tasador-ml</code>.</li>
          <li>Subí <code>tasador.html</code> al repo.</li>
          <li>Borrá esta página (<code>callback.html</code>) del repo. No la necesitás más.</li>
        </ol>
      </div>
      <div class="box">
        <label>Token info (para tu registro):</label>
        <div class="code">user_id: ${data.user_id}<br>scope: ${data.scope}<br>expira: ${expiresAt}</div>
      </div>
    `;
    document.getElementById('state-result').style.display = 'block';

  } catch (e) {
    document.getElementById('state-loading').style.display = 'none';
    document.getElementById('state-result').innerHTML = `<div class="box err">❌ ${e.message}</div>`;
    document.getElementById('state-result').style.display = 'block';
    document.getElementById('state-manual').style.display = 'block';
  }
}
</script>

</body>
</html>
