<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firma Digital · Varela Inmobiliaria</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --amarillo: #F5E642;
  --amarillo-dark: #D4C520;
  --amarillo-pale: #FDFBE8;
  --gris-dark: #3D3F52;
  --gris-darker: #2A2B38;
  --bg: #FAF9F5;
  --bg-card: #FFFFFF;
  --text: #2E2F3E;
  --text-2: #6B6F8A;
  --text-3: #A0A3B5;
  --border: rgba(107,111,138,0.12);
  --shadow: 0 2px 12px rgba(60,62,82,0.06);
  --shadow-lg: 0 16px 48px rgba(60,62,82,0.12);
  --radius: 10px;
  --radius-lg: 16px;
  --verde: #22C55E;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:var(--gris-dark);border-bottom:3px solid var(--amarillo);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.header img{height:44px;}
.header-link{color:var(--amarillo);text-decoration:none;font-size:13px;font-weight:600;}
.container{max-width:800px;margin:32px auto;padding:0 20px 60px;}
.doc-card{background:var(--bg-card);border-radius:var(--radius-lg);padding:40px;box-shadow:var(--shadow-lg);border:1px solid var(--border);}
.doc-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--gris-dark);text-align:center;margin-bottom:24px;text-transform:uppercase;}
.doc-section{font-size:14px;font-weight:700;color:var(--gris-dark);text-transform:uppercase;border-bottom:1px solid var(--gris-dark);padding-bottom:4px;margin:20px 0 10px;}
.doc-text{font-size:13px;color:var(--text);line-height:1.7;margin-bottom:8px;}
.doc-sep{border-top:1px dashed #ccc;margin:16px 0;}
.doc-strong{font-weight:700;}
.firma-section{background:var(--amarillo-pale);border:2px solid var(--amarillo);border-radius:var(--radius-lg);padding:28px;margin-top:32px;}
.firma-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gris-dark);margin-bottom:6px;text-align:center;}
.firma-sub{font-size:13px;color:var(--text-2);text-align:center;margin-bottom:20px;line-height:1.6;}
.firma-group{margin-bottom:14px;}
.firma-label{font-size:10px;font-weight:600;color:var(--text-3);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:1.5px;}
.firma-input{width:100%;padding:12px 16px;border:1px solid rgba(107,111,138,0.18);border-radius:var(--radius);font-size:14px;font-family:'DM Sans',sans-serif;background:#fff;color:var(--text);outline:none;transition:all 0.2s;}
.firma-input:focus{border-color:var(--amarillo-dark);box-shadow:0 0 0 3px rgba(245,230,66,0.15);}
.firma-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.firma-check{display:flex;align-items:flex-start;gap:10px;margin:16px 0;}
.firma-check input{width:18px;height:18px;accent-color:var(--amarillo-dark);flex-shrink:0;margin-top:2px;}
.firma-check label{font-size:12.5px;color:var(--text);cursor:pointer;line-height:1.5;}
.btn-firmar{width:100%;padding:16px;border-radius:var(--radius);border:none;background:var(--verde);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.25s;margin-top:8px;}
.btn-firmar:hover{background:#16A34A;transform:translateY(-1px);}
.btn-firmar:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.firmado-badge{background:#DCFCE7;border:2px solid #86EFAC;border-radius:var(--radius-lg);padding:28px;margin-top:32px;text-align:center;}
.firmado-icon{font-size:48px;margin-bottom:12px;}
.firmado-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#15803D;margin-bottom:8px;}
.firmado-text{font-size:13px;color:#166534;line-height:1.7;}
.loading{text-align:center;padding:80px 20px;}
.spinner{width:40px;height:40px;border:3px solid var(--amarillo-pale);border-top-color:var(--amarillo-dark);border-radius:50%;margin:0 auto 16px;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.error{text-align:center;padding:80px 20px;font-size:15px;color:#991B1B;}
.footer{background:var(--gris-darker);padding:24px;text-align:center;margin-top:auto;}
.footer-text{font-size:12px;color:rgba(255,255,255,0.2);}
.legal-note{font-size:10px;color:var(--text-3);line-height:1.6;padding:12px;background:var(--bg);border-radius:var(--radius);margin-top:14px;}
@media(max-width:600px){
  .doc-card{padding:24px 18px;}
  .firma-row{grid-template-columns:1fr;}
}
@media print{
  .header,.footer,.firma-section,.firmado-badge,.no-print{display:none!important;}
  .doc-card{box-shadow:none;border:none;padding:20px;}
}
</style>
</head>
<body>

<div class="header">
  <a href="index.html"><img src="https://www.varelapropiedadescde.com.ar/logo-varela.png" alt="Varela Inmobiliaria" onerror="this.outerHTML='<span style=color:var(--amarillo);font-weight:700;font-size:16px>VARELA</span>'"></a>
  <a href="index.html" class="header-link">← Volver al sitio</a>
</div>

<div class="container">
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div style="font-size:14px;color:var(--text-2);">Cargando documento...</div>
  </div>
  <div id="error" class="error" style="display:none;"></div>
  <div id="contenido" style="display:none;"></div>
</div>

<div class="footer">
  <div class="footer-text">© 2026 Varela Inmobiliaria · Costa del Este · Mar del Tuyú</div>
</div>

<script>
var SUPABASE_URL = 'https://fwwzjynerfghqsakkyvq.supabase.co';
var SUPABASE_KEY = 'sb_publishable_8F1HY-6hTbgfTnbKdCSAJA_J26tLIup';
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var docData = null;
var docId = null;

var params = new URLSearchParams(window.location.search);
docId = params.get('id');

if (!docId) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
  document.getElementById('error').textContent = 'Link inválido. No se encontró el documento.';
} else {
  cargarDocumento(docId);
}

async function cargarDocumento(id) {
  try {
    var { data, error } = await sb.from('documentos_firma').select('*').eq('id', id).single();
    if (error || !data) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = 'No se encontró el documento. Verificá el link.';
      return;
    }
    docData = data;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('contenido').style.display = 'block';
    renderDocumento();
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'Error al cargar el documento.';
  }
}

function formatFecha(f) {
  if (!f) return '_______________';
  return new Date(f + 'T12:00:00').toLocaleDateString('es-AR', {day:'numeric', month:'long', year:'numeric'});
}

function renderDocumento() {
  var d = docData.datos;
  var html = '<div class="doc-card">';

  if (docData.tipo === 'reserva') {
    html += renderSeña(d);
  } else {
    html += renderAceptacion(d);
  }

  html += '</div>';

  // Sección de firma o badge de firmado
  if (docData.estado === 'firmado') {
    html += renderFirmado();
  } else {
    html += renderFormFirma();
  }

  document.getElementById('contenido').innerHTML = html;
}

function renderSeña(d) {
  var fecha = formatFecha(d.fecha);
  var h = '';
  h += '<div class="doc-title">Recibo de Seña Provisorio</div>';
  h += '<div class="doc-text">En la ciudad de <strong>' + (d.ciudad || '') + '</strong>, Provincia de Buenos Aires, a los ' + fecha + ', se extiende el presente Recibo de Seña, conforme a las siguientes condiciones:</div>';

  h += '<div class="doc-section">Datos del Comprador</div>';
  h += '<div class="doc-text">Nombre y Apellido: <strong>' + (d.comprador_nombre || '') + '</strong><br>';
  h += 'DNI: ' + (d.comprador_dni || '') + '<br>';
  h += 'Domicilio: ' + (d.comprador_dom || '') + '<br>';
  h += 'Teléfono: ' + (d.comprador_tel || '') + '</div>';

  h += '<div class="doc-section">Inmueble Objeto de la Operación</div>';
  h += '<div class="doc-text">Ubicado en: <strong>' + (d.inmueble_dir || '') + '</strong><br>';
  h += 'Descripción: ' + (d.inmueble_desc || '') + '<br>';
  h += 'Nomenclatura Catastral: <strong>' + (d.catastral || '') + '</strong></div>';

  h += '<div class="doc-section">Monto de la Seña</div>';
  h += '<div class="doc-text">Se recibe del COMPRADOR la suma de DÓLARES ESTADOUNIDENSES <strong>USD ' + (d.sena_num || '') + '</strong> (' + (d.sena_letras || '') + '), en concepto de SEÑA AD REFERÉNDUM, correspondiente al inmueble detallado precedentemente.</div>';
  h += '<div class="doc-sep"></div>';

  h += '<div class="doc-section">Precio Total de la Operación</div>';
  h += '<div class="doc-text">El precio total convenido para la presente operación asciende a la suma de DÓLARES ESTADOUNIDENSES <strong>USD ' + (d.precio_num || '') + '</strong> (' + (d.precio_letras || '') + ').</div>';
  h += '<div class="doc-sep"></div>';

  h += '<div class="doc-section">Forma de Pago</div>';
  h += '<div class="doc-text">' + (d.forma_pago || '').replace(/\n/g, '<br>') + '</div>';

  h += '<div class="doc-section">Honorarios y Gastos</div>';
  h += '<div class="doc-text">' + (d.clausula_honorarios || '').replace(/\n/g, '<br>') + '</div>';
  h += '<div class="doc-text">Interviene en esta venta el Martillero y Corredor Público <strong>JORGE OSCAR VARELA</strong>, con Matrícula <strong>T°III F°103 N°865</strong> de la Prov. de Buenos Aires siendo sus honorarios pactados con el COMPRADOR de DÓLARES ESTADOUNIDENSES BILLETES <strong>USD ' + (d.honorarios_num || '') + '</strong> (' + (d.honorarios_letras || '') + ') pagaderos a la firma de la escritura.</div>';

  h += '<div class="doc-section">Escrituración</div>';
  h += '<div class="doc-text">La Escritura Traslativa de Dominio del inmueble referenciado será otorgada por ante la Escribana <strong>' + (d.escribana || '') + '</strong>, en un plazo de ' + (d.plazo || '') + ' días a la firma de la presente, con oficina en ' + (d.escribana_dom || '') + ', Tel ' + (d.escribana_tel || '') + ', siendo su designación de carácter esencial y necesario para la venta.</div>';
  h += '<div class="doc-sep"></div>';

  h += '<div class="doc-section">Condiciones de la Reserva</div>';
  h += '<div class="doc-text">' + (d.clausula_reserva || '').replace(/\n/g, '<br>') + '</div>';
  h += '<div class="doc-sep"></div>';

  h += '<div class="doc-section">Entrega y Estado del Inmueble</div>';
  h += '<div class="doc-text">' + (d.clausula_entrega || '').replace(/\n/g, '<br>') + '</div>';
  h += '<div class="doc-sep"></div>';

  h += '<div class="doc-section">Jurisdicción</div>';
  h += '<div class="doc-text">' + (d.clausula_jurisdiccion || '').replace(/\n/g, '<br>') + '</div>';
  h += '<div class="doc-text">En prueba de conformidad, se firman dos (2) ejemplares de un mismo tenor y a un solo efecto, en el lugar y fecha indicados al inicio.</div>';

  return h;
}

function renderAceptacion(d) {
  var fecha = formatFecha(d.fecha);
  var h = '';
  h += '<div class="doc-title">Aceptación de Oferta</div>';
  h += '<div class="doc-text"><strong>' + (d.ciudad || '') + ', ' + fecha + '.</strong></div>';

  h += '<div class="doc-text" style="margin-top:16px;">Quien suscribe: <strong>' + (d.vendedor_nombre || '') + '</strong>, DNI N° <strong>' + (d.vendedor_dni || '') + '</strong>, y en su carácter de titular del inmueble ubicado en <strong>' + (d.inmueble_dir || '') + '</strong> con la siguiente Nomenclatura Catastral <strong>' + (d.catastral || '') + '</strong>, viene por la presente y dice que <strong>ACEPTA LA RESERVA AD REFERÉNDUM</strong> tomada por <strong>INMOBILIARIA VARELA</strong>, de <strong>DÓLARES ESTADOUNIDENSES BILLETES USD ' + (d.sena_num || '') + ' (' + (d.sena_letras || '') + ')</strong>, en concepto de reserva del inmueble.</div>';
  h += '<div class="doc-sep"></div>';

  h += '<div class="doc-text">El precio convenido para la presente proposición de compra asciende a realizarse por la suma de DÓLARES ESTADOUNIDENSES BILLETES <strong>USD ' + (d.precio_num || '') + ' (' + (d.precio_letras || '') + ')</strong>, libre de gastos para el VENDEDOR, pagaderos de la siguiente forma: a la firma de la escritura, el monto de DÓLARES ESTADOUNIDENSES BILLETES <strong>USD ' + (d.precio_num || '') + ' (' + (d.precio_letras || '') + ')</strong>.</div>';
  h += '<div class="doc-sep"></div>';

  h += '<div class="doc-text">' + (d.clausula_gastos || '').replace(/\n/g, '<br>') + '</div>';
  h += '<div class="doc-sep"></div>';

  h += '<div class="doc-text">' + (d.clausula_honorarios || '').replace(/\n/g, '<br>') + '</div>';
  h += '<div class="doc-sep"></div>';

  h += '<div class="doc-text">La Escritura Traslativa de Dominio del inmueble referenciado será otorgada por ante la Escribana <strong>' + (d.escribana || '') + '</strong>, con oficina en ' + (d.escribana_dom || '') + ', Tel ' + (d.escribana_tel || '') + ', siendo su designación de carácter esencial y necesario para la venta, siendo el plazo de firma dentro de los ' + (d.plazo || '') + ' días, contados a partir de la fecha de suscripción del presente acuerdo.</div>';
  h += '<div class="doc-sep"></div>';

  h += '<div class="doc-text">La presente <strong>ACEPTACION DE OFERTA</strong> será mantenida por un plazo de 7 días hábiles de firmado este documento, fecha en la que deberá comparecer la parte compradora para efectuar la reserva.</div>';
  h += '<div class="doc-text">La propiedad se entregará libre de deudas, con todos los impuestos, tasas, obras, servicios y consumos al día de la posesión.</div>';
  h += '<div class="doc-text">De existir algún tipo de arrepentimiento por parte del vendedor, éste reintegrará el doble de la suma entregada por el comprador, más los gastos que se generen por el acto.</div>';

  if (d.notas) {
    h += '<div class="doc-text" style="margin-top:8px;">' + d.notas.replace(/\n/g, '<br>') + '</div>';
  }
  h += '<div class="doc-sep"></div>';

  h += '<div class="doc-text">En todo de acuerdo con lo pactado, se firman <strong>2 ejemplares</strong> de un mismo tenor y a un solo efecto, en la ciudad de <strong>' + (d.ciudad || '') + '</strong>, Provincia de <strong>BUENOS AIRES</strong>, a la fecha del ' + fecha + '.</div>';

  return h;
}

function renderFirmado() {
  var h = '<div class="firmado-badge">';
  h += '<div class="firmado-icon">✅</div>';
  h += '<div class="firmado-title">Documento firmado</div>';
  h += '<div class="firmado-text">';
  h += 'Firmado por <strong>' + (docData.firma_nombre || '') + '</strong>';
  h += ' (DNI: ' + (docData.firma_dni || '') + ')';
  h += '<br>Fecha: ' + (docData.firma_fecha || '') + ' a las ' + (docData.firma_hora || '') + ' hs';
  h += '</div>';
  h += '<button onclick="window.print()" class="no-print" style="margin-top:16px;padding:12px 28px;background:var(--gris-dark);color:var(--amarillo);border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;">🖨️ Imprimir / Guardar PDF</button>';
  h += '</div>';
  return h;
}

function renderFormFirma() {
  var rolFirma = docData.tipo === 'reserva' ? 'COMPRADOR' : 'VENDEDOR';
  var h = '<div class="firma-section">';
  h += '<div class="firma-title">✍️ Firma digital del ' + rolFirma + '</div>';
  h += '<div class="firma-sub">Leé el documento completo y confirmá tu aceptación completando los datos a continuación.</div>';

  h += '<div class="firma-row">';
  h += '<div class="firma-group"><label class="firma-label">Nombre completo (como firma) *</label><input class="firma-input" id="firma-nombre" placeholder="Escribí tu nombre completo"></div>';
  h += '<div class="firma-group"><label class="firma-label">DNI *</label><input class="firma-input" id="firma-dni" placeholder="Número de documento"></div>';
  h += '</div>';

  h += '<div class="firma-check"><input type="checkbox" id="firma-acepto"><label for="firma-acepto">He leído el documento completo y acepto los términos y condiciones establecidos. Confirmo que los datos son correctos y que esta firma digital tiene carácter de conformidad.</label></div>';

  h += '<button class="btn-firmar" id="btn-firmar" onclick="firmarDocumento()">✅ Firmar y aceptar</button>';

  h += '<div class="legal-note">🔒 La firma digital consiste en la confirmación del nombre completo y DNI del firmante, junto con la aceptación expresa de los términos del documento. Esta constancia queda registrada con fecha y hora. La formalización definitiva se realizará mediante la firma del contrato correspondiente entre las partes.</div>';
  h += '</div>';
  return h;
}

async function firmarDocumento() {
  var nombre = document.getElementById('firma-nombre').value.trim();
  var dni = document.getElementById('firma-dni').value.trim();
  var acepto = document.getElementById('firma-acepto').checked;

  if (!nombre) { alert('Escribí tu nombre completo'); return; }
  if (!dni) { alert('Ingresá tu DNI'); return; }
  if (!acepto) { alert('Tenés que aceptar los términos del documento'); return; }

  var btn = document.getElementById('btn-firmar');
  btn.disabled = true;
  btn.textContent = 'Firmando...';

  var ahora = new Date();
  var fechaFirma = ahora.toLocaleDateString('es-AR');
  var horaFirma = ahora.toLocaleTimeString('es-AR');

  var { error } = await sb.from('documentos_firma').update({
    estado: 'firmado',
    firma_nombre: nombre,
    firma_dni: dni,
    firma_fecha: fechaFirma,
    firma_hora: horaFirma
  }).eq('id', docId);

  if (error) {
    console.error(error);
    btn.disabled = false;
    btn.textContent = '✅ Firmar y aceptar';
    alert('Error al firmar. Intentá de nuevo.');
    return;
  }

  // Notificar a Sebastián por WA
  var d = docData.datos;
  var tipoDoc = docData.tipo === 'reserva' ? 'RECIBO DE SEÑA' : 'ACEPTACIÓN DE OFERTA';
  var persona = docData.tipo === 'reserva' ? (d.comprador_nombre || '') : (d.vendedor_nombre || '');
  await sb.from('mensajes_wa').insert({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2),
    contacto_tel: '5492257546284',
    mensaje: '✅ *DOCUMENTO FIRMADO DIGITALMENTE*\n\n' +
      '📋 ' + tipoDoc + '\n' +
      '👤 Firmante: ' + nombre + '\n' +
      '🪪 DNI: ' + dni + '\n' +
      '📅 ' + fechaFirma + ' · ' + horaFirma + '\n\n' +
      '🏠 ' + (d.inmueble_dir || '') + '\n' +
      '💰 USD ' + (d.precio_num || '') + '\n\n' +
      '_Podés reimprimir el documento firmado desde el link_',
    estado: 'pendiente'
  });

  // Actualizar vista
  docData.estado = 'firmado';
  docData.firma_nombre = nombre;
  docData.firma_dni = dni;
  docData.firma_fecha = fechaFirma;
  docData.firma_hora = horaFirma;
  renderDocumento();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
