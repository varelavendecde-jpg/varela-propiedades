<!DOCTYPE html>
<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varela Inmobiliaria · CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --amarillo: #F5E642;
  --amarillo-dark: #D4C520;
  --amarillo-light: #FBF5A0;
  --amarillo-pale: #FDFBE8;
  --gris: #6B6F8A;
  --gris-dark: #4A4D63;
  --gris-light: #9497AA;
  --gris-pale: #EEEEF3;
  --bg: #F7F6F0;
  --bg-card: #FFFFFF;
  --bg-side: #3D3F52;
  --text: #2E2F3E;
  --text-2: #6B6F8A;
  --text-3: #A0A2B1;
  --border: #E1E1E8;
  --shadow: 0 4px 12px rgba(0,0,0,0.05);
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

aside { width: 260px; background: var(--bg-side); color: #fff; display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
.logo-container { padding: 10px 0 30px; text-align: center; }
.logo-container img { width: 140px; filter: brightness(0) invert(1); }

nav { flex: 1; }
nav button { width: 100%; background: none; border: none; color: #ADB0BB; padding: 14px 16px; text-align: left; font-size: 15px; font-weight: 500; cursor: pointer; border-radius: 8px; margin-bottom: 4px; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
nav button i { font-size: 18px; }
nav button:hover { background: rgba(255,255,255,0.05); color: #fff; }
nav button.active { background: var(--amarillo); color: var(--bg-side); }

main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
header { height: 70px; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; flex-shrink: 0; }
header h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; color: var(--gris-dark); }

.content-section { display: none; flex: 1; padding: 30px; overflow-y: auto; }
.content-section.active { display: flex; flex-direction: column; }

/* Mensajes / Chat Layout */
#sec-mensajes { padding: 0; flex-direction: row; }
.chat-sidebar { width: 320px; border-right: 1px solid var(--border); background: #fff; display: flex; flex-direction: column; }
.chat-search { padding: 15px; border-bottom: 1px solid var(--border); }
.chat-search input { width: 100%; padding: 10px 15px; border-radius: 20px; border: 1px solid var(--border); background: var(--gris-pale); outline: none; }
.chat-list { flex: 1; overflow-y: auto; }
.chat-item { padding: 15px; border-bottom: 1px solid var(--gris-pale); cursor: pointer; transition: 0.2s; }
.chat-item:hover { background: var(--amarillo-pale); }
.chat-item.active { background: var(--amarillo-light); }
.chat-item-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
.chat-item-last { font-size: 13px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.chat-main { flex: 1; display: flex; flex-direction: column; background: #E5DDD5; position: relative; }
.chat-header { height: 60px; background: #f0f0f0; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; font-weight: 600; }
.chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.message { max-width: 70%; padding: 8px 12px; border-radius: 8px; font-size: 14px; line-height: 1.4; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
.message.received { background: #fff; align-self: flex-start; }
.message.sent { background: #DCF8C6; align-self: flex-end; }
.chat-input-area { height: 70px; background: #f0f0f0; display: flex; align-items: center; padding: 0 15px; gap: 10px; }
.chat-input-area input { flex: 1; padding: 12px 20px; border-radius: 25px; border: none; outline: none; font-size: 15px; }
.chat-send-btn { background: var(--amarillo); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

</style>
</head>
<body>

<aside>
  <div class="logo-container">
    <img src="https://i.ibb.co/pBqN7R3/Logo-Varela-Blanco.png" alt="Logo">
  </div>
  <nav>
    <button onclick="showSec(&#39;mensajes&#39;)" id="btn-nav-mensajes" class="active">WhatsApp</button>
    <button onclick="showSec(&#39;contactos&#39;)" id="btn-nav-contactos">Contactos</button>
    <button onclick="showSec(&#39;propiedades&#39;)" id="btn-nav-propiedades">Propiedades</button>
  </nav>
</aside>

<main>
  <header>
    <h1 id="main-title">WhatsApp</h1>
  </header>

  <section id="sec-mensajes" class="content-section active">
    <div class="chat-sidebar">
      <div class="chat-search"><input type="text" placeholder="Buscar contacto..." id="search-chat"></div>
      <div class="chat-list" id="chat-list"></div>
    </div>
    <div class="chat-main">
      <div class="chat-header" id="active-chat-name">Seleccioná un chat</div>
      <div class="chat-messages" id="chat-messages-container"></div>
      <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Escribí un mensaje..." onkeypress="if(event.key===&#39;Enter&#39;) sendMessage()">
        <button class="chat-send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </section>

  <section id="sec-contactos" class="content-section"><h2>Contactos</h2></section>
  <section id="sec-propiedades" class="content-section"><h2>Propiedades</h2></section>
</main>

<script>
const SB_URL = 'https://fwwzjynerfghqsakkyvq.supabase.co';
const SB_KEY = 'sb_publishable_8F1HY-6hTbgfTnbKdCSAJA_J26tLIup';
const sb = supabase.createClient(SB_URL, SB_KEY);

let activeChatId = null;

function showSec(id) {
  document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  document.getElementById('btn-nav-' + id).classList.add('active');
  document.getElementById('main-title').innerText = id.charAt(0).toUpperCase() + id.slice(1);
}

// Función para enviar mensaje conectada al bot.js
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !activeChatId) return;

  // UI: Mostrar mensaje en pantalla
  const container = document.getElementById('chat-messages-container');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message sent';
  msgDiv.innerHTML = `<div class="message-content">${text}</div>`;
  container.appendChild(msgDiv);
  container.scrollTop = container.scrollHeight;
  input.value = '';

  try {
    // 1. Avisar al BOT (Archivo bot.js en tu PC)
    await fetch('http://localhost:3000/enviar-mensaje', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ numero: activeChatId, mensaje: text })
    });

    // 2. Guardar en Supabase
    await sb.from('mensajes_wa').insert({
      contacto_tel: activeChatId,
      mensaje: text,
      estado: 'enviado'
    });
  } catch (err) {
    console.error(err);
    alert('Error: El bot.js no está corriendo en tu PC.');
  }
}

async function loadChats() {
  const { data } = await sb.from('mensajes_wa').select('*').order('created_at', { ascending: false });
  if (!data) return;
  const list = document.getElementById('chat-list');
  list.innerHTML = '';
  const contactos = [...new Set(data.map(m => m.contacto_tel))];
  contactos.forEach(tel => {
    const item = document.createElement('div');
    item.className = 'chat-item';
    item.onclick = () => openChat(tel);
    item.innerHTML = `<div class="chat-item-name">${tel}</div>`;
    list.appendChild(item);
  });
}

async function openChat(tel) {
  activeChatId = tel;
  document.getElementById('active-chat-name').innerText = tel;
  const { data } = await sb.from('mensajes_wa').select('*').eq('contacto_tel', tel).order('created_at', { ascending: true });
  const container = document.getElementById('chat-messages-container');
  container.innerHTML = '';
  data.forEach(m => {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${m.estado === 'enviado' ? 'sent' : 'received'}`;
    msgDiv.innerHTML = `<div class="message-content">${m.mensaje}</div>`;
    container.appendChild(msgDiv);
  });
  container.scrollTop = container.scrollHeight;
}

loadChats();
setInterval(loadChats, 10000);
</script>
</body></html>
