<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Varela Inmobiliaria · CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
    :root { --amarillo: #F5E642; --bg-side: #3D3F52; --bg: #F7F6F0; }
    body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); }
    aside { width: 250px; background: var(--bg-side); color: white; padding: 20px; }
    .logo { width: 100%; filter: brightness(0) invert(1); margin-bottom: 30px; }
    nav button { width: 100%; background: none; border: none; color: #ccc; padding: 15px; text-align: left; cursor: pointer; font-size: 16px; }
    nav button.active { background: var(--amarillo); color: #333; border-radius: 8px; }
    main { flex: 1; display: flex; flex-direction: column; }
    header { background: white; padding: 20px; border-bottom: 1px solid #ddd; font-family: 'Barlow Condensed'; font-size: 24px; }
    #sec-mensajes { display: flex; flex: 1; overflow: hidden; }
    .chat-sidebar { width: 300px; background: white; border-right: 1px solid #ddd; overflow-y: auto; }
    .chat-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
    .chat-item:hover { background: #f9f9f9; }
    .chat-main { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
    .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .message { padding: 10px; border-radius: 8px; max-width: 70%; font-size: 14px; }
    .sent { background: #dcf8c6; align-self: flex-end; }
    .received { background: white; align-self: flex-start; }
    .input-area { padding: 20px; background: #f0f0f0; display: flex; gap: 10px; }
    input { flex: 1; padding: 12px; border-radius: 20px; border: none; outline: none; }
    .send-btn { background: var(--amarillo); border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>
<aside>
    <img src="https://i.ibb.co/pBqN7R3/Logo-Varela-Blanco.png" class="logo">
    <nav><button class="active">WhatsApp</button></nav>
</aside>
<main>
    <header>VARELA INMOBILIARIA - PANEL DE CONTROL</header>
    <section id="sec-mensajes">
        <div class="chat-sidebar" id="chat-list"></div>
        <div class="chat-main">
            <div class="chat-messages" id="chat-container"></div>
            <div class="input-area">
                <input type="text" id="chat-input" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">ENVIAR</button>
            </div>
        </div>
    </section>
</main>

<script>
const sb = supabase.createClient('https://fwwzjynerfghqsakkyvq.supabase.co', 'sb_publishable_8F1HY-6hTbgfTnbKdCSAJA_J26tLIup');
let activeChat = null;

async function loadChats() {
    const { data } = await sb.from('mensajes_wa').select('*').order('created_at', { ascending: false });
    if (!data) return;
    const list = document.getElementById('chat-list');
    const unique = [...new Set(data.map(m => m.contacto_tel))];
    list.innerHTML = unique.map(tel => `<div class="chat-item" onclick="openChat('${tel}')"><strong>${tel}</strong></div>`).join('');
}

async function openChat(tel) {
    activeChat = tel;
    const { data } = await sb.from('mensajes_wa').select('*').eq('contacto_tel', tel).order('created_at', { ascending: true });
    const container = document.getElementById('chat-container');
    container.innerHTML = data.map(m => `<div class="message ${m.estado === 'enviado' ? 'sent' : 'received'}">${m.mensaje}</div>`).join('');
    container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || !activeChat) return;

    input.value = '';
    // 1. Al Bot
    fetch('http://localhost:3000/enviar-mensaje', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ numero: activeChat, mensaje: text })
    });
    // 2. A Supabase
    await sb.from('mensajes_wa').insert({ contacto_tel: activeChat, mensaje: text, estado: 'enviado' });
    openChat(activeChat);
}

setInterval(loadChats, 5000);
loadChats();
</script>
</body>
</html>
